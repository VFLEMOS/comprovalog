<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acompanhamento de Viagem - Solumax</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#F7F6F6;min-height:100vh;padding:1.5rem}
.app{max-width:900px;margin:0 auto;display:flex;flex-direction:column;gap:1rem}
.header{background:#fff;border-radius:16px;padding:1.25rem 1.75rem;border:1px solid #e2e8f0;box-shadow:0 2px 8px rgba(22,44,66,.07);display:flex;flex-direction:column;gap:1rem}
.header-top{display:flex;align-items:center;justify-content:space-between}
.header-logo img{height:32px;display:block}
.header-meta{display:flex;align-items:center;gap:.75rem}
.tag{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#162C42;background:rgba(22,44,66,.07);padding:4px 10px;border-radius:20px;border:1px solid rgba(22,44,66,.15)}
.hstatus{display:flex;align-items:center;gap:5px;font-size:11px;color:#A5A7A7}
.sdot{width:6px;height:6px;border-radius:50%;background:#4ade80;display:inline-block}
.date-txt{font-size:12px;color:#A5A7A7}
.fields-row{display:grid;grid-template-columns:80px 180px 1fr;gap:.75rem;align-items:end}
.field-box{background:#F7F6F6;border:1px solid #e2e8f0;border-radius:8px;padding:.5rem .85rem}
.field-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#A5A7A7;margin-bottom:4px}
.field-input{background:transparent;border:none;outline:none;font-size:13px;font-weight:600;color:#162C42;width:100%;font-family:inherit}
.field-input::placeholder{color:#C0C2C2;font-weight:400}
.field-input[type=number]{-moz-appearance:textfield}
.field-input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.plate-f{text-transform:uppercase;letter-spacing:.1em;font-family:monospace;font-size:14px}
.prog-wrap{display:flex;align-items:center;gap:.75rem}
.prog{flex:1;height:6px;background:#e0e4e8;border-radius:3px}
.prog-fill{height:100%;background:#162C42;border-radius:3px;transition:width .4s}
.prog-lbl{font-size:12px;font-weight:700;color:#162C42;min-width:40px;text-align:right}
.steps-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.step-card{background:#fff;border-radius:12px;padding:1rem;border:1.5px solid #e2e8f0;display:flex;flex-direction:column;gap:.75rem;transition:border-color .2s,box-shadow .2s}
.step-card.active{border-color:#162C42;box-shadow:0 2px 12px rgba(22,44,66,.1)}
.step-card.done{border-color:#c8d8e8;background:#fafcff}
.step-hd{display:flex;align-items:center;gap:.75rem}
.snum{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;background:#f1f5f9;color:#94a3b8;border:1.5px solid #e2e8f0}
.snum.done{background:#162C42;color:#fff;border-color:#162C42}
.snum.active{background:#F0F4F8;color:#162C42;border-color:#162C42}
.sinfo{flex:1}
.stitle{font-size:13px;font-weight:700;color:#1e293b;margin-bottom:1px}
.ssub{font-size:11px;color:#94a3b8}
.step-icon{font-size:20px}
.upload-label{display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px dashed #cbd5e1;border-radius:10px;padding:20px;text-align:center;background:#f8fafc;cursor:pointer;transition:border-color .2s,background .2s;min-height:120px}
.upload-label:hover{border-color:#162C42;background:#f0f4f8}
.upload-label .utxt{font-size:12px;color:#94a3b8;font-weight:500}
.upload-label .hint{font-size:10px;color:#b0bec8;margin-top:3px}
.photo-icon{font-size:28px;display:block;margin-bottom:6px}
.converting{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:120px;gap:8px;color:#94a3b8;font-size:12px}
.spinner{width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#162C42;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.photo-preview{width:100%;border-radius:8px;display:block;height:auto}
.meta-row{display:flex;gap:.5rem;margin-top:.25rem;flex-wrap:wrap}
.time-box{display:flex;align-items:center;gap:6px;padding:.4rem .7rem;background:#f1f5f9;border-radius:8px;flex-shrink:0}
.time-label{font-size:10px;color:#64748b;white-space:nowrap;font-weight:600}
.time-input{font-size:12px;font-weight:700;color:#162C42;background:transparent;border:none;outline:none;font-family:monospace;width:75px}
.gps-box{display:flex;align-items:center;gap:6px;padding:.4rem .7rem;background:#eef7ee;border-radius:8px;border:1px solid #b8deb8}
.gps-box.nogps{background:#fff8f0;border-color:#f0d8b0}
.gps-lbl{font-size:10px;font-weight:700;color:#2d7a2d}
.gps-lbl.nogps{color:#b07800}
.gps-link{font-size:10px;color:#2d7a2d;text-decoration:none;font-weight:600}
.gps-link:hover{text-decoration:underline}
.obs-input{flex:1;min-width:120px;font-size:12px;color:#475569;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:.4rem .7rem;outline:none;font-family:inherit;resize:none}
.obs-input::placeholder{color:#b0bec8}
.swap-btn{font-size:11px;color:#94a3b8;background:none;border:none;cursor:pointer;text-align:left;padding:0}
.locked-area{border:1.5px dashed #e2e8f0;border-radius:10px;padding:20px;text-align:center;opacity:.35;pointer-events:none;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.locked-area span{font-size:11px;color:#94a3b8}
.btn-primary{width:100%;padding:15px;background:#162C42;color:#fff;font-size:14px;font-weight:700;border:none;border-radius:12px;cursor:pointer}
.btn-primary:disabled{background:#c8d8e8;color:#8a9aaa;cursor:not-allowed}
.report-panel{background:#fff;border-radius:14px;overflow:hidden;display:none;border:1.5px solid #e2e8f0}
.report-panel.visible{display:block}
.report-hd{padding:1.1rem 1.75rem;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}
.report-hd h3{font-size:16px;font-weight:700;color:#162C42}
.report-hd p{font-size:11px;color:#94a3b8;margin-top:2px}
.report-badge{font-size:11px;font-weight:700;color:#fff;background:#162C42;padding:5px 14px;border-radius:20px}
.data-grid{display:grid;grid-template-columns:repeat(4,1fr)}
.data-cell{padding:.75rem 1.75rem;border-bottom:1px solid #f1f5f9;border-right:1px solid #f1f5f9}
.data-cell:nth-child(4n){border-right:none}
.data-cell.full{grid-column:1/-1;border-right:none}
.data-lbl{font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.data-val{font-size:13px;font-weight:700;color:#162C42;font-family:monospace}
.steps-section{padding:1rem 1.75rem;border-bottom:1px solid #f1f5f9}
.steps-lbl{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.6rem}
.rstep{display:flex;align-items:flex-start;gap:10px;font-size:12px;color:#475569;padding:6px 0;border-bottom:1px solid #f8fafc}
.rstep:last-child{border-bottom:none}
.rstep-dot{width:8px;height:8px;border-radius:50%;background:#162C42;flex-shrink:0;margin-top:3px}
.rstep-time{font-family:monospace;font-weight:700;color:#162C42;margin-right:4px}
.rstep-gps{font-size:10px;color:#2d7a2d;margin-top:2px}
.rstep-gps.nogps{color:#b07800}
.rstep-obs{font-size:11px;color:#94a3b8;margin-top:2px;font-style:italic}
.report-actions{padding:1rem 1.75rem;display:flex;gap:.75rem;align-items:center}
.btn-pdf{flex:1;padding:13px;background:#162C42;color:#fff;font-size:14px;font-weight:700;border:none;border-radius:10px;cursor:pointer}
.btn-pdf:disabled{background:#c8d8e8;color:#8a9aaa;cursor:not-allowed}
.btn-nova{padding:13px 24px;background:#fff;color:#162C42;font-size:14px;font-weight:700;border:2px solid #162C42;border-radius:10px;cursor:pointer}
.pdf-hint{font-size:10px;color:#94a3b8;line-height:1.5}
</style>
</head>

<script>
// ── LICENCA COMPROVOLOG ──
// Licenca via Google Sheets publicado como CSV
// Coluna A: campo, Coluna B: valor
// Linha 1: cliente | Solumax
// Linha 2: status  | ativo
// Linha 3: validade| 2026-12-11
var _LIC_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSORYsHGl99A5G57XWSGFSUxWyOyegUBzRpUvSyIIvEEYUdykMRbd9Lw_5mddcS7SrS6U4ER4E6tvsM/pub?gid=0&single=true&output=csv";

function parseLicenseCSV(csv){
  var lines=csv.trim().split(/\r?\n/);
  var data={};
  lines.forEach(function(line){
    // Remove BOM, aspas e espacos extras
    line=line.replace(/^\uFEFF/,"").trim();
    if(!line) return;
    var idx=line.indexOf(",");
    if(idx<0) return;
    var key=line.substring(0,idx).trim().replace(/"/g,"").toLowerCase();
    var val=line.substring(idx+1).trim().replace(/^"|"$/g,"").trim();
    if(key) data[key]=val;
  });
  return data;
}

function checkLicense(){
  var overlay=document.getElementById("license-overlay");
  var app=document.getElementById("app-content");
  fetch(_LIC_URL+"&nocache="+Date.now(),{
    cache:"no-store",
    headers:{"Accept":"text/csv,text/plain,*/*"}
  })
    .then(function(r){
      if(!r.ok) throw new Error("HTTP "+r.status);
      return r.text();
    })
    .then(function(csv){
      var d=parseLicenseCSV(csv);
      var hoje=new Date();
      // Suporta data no formato YYYY-MM-DD ou numero serial do Sheets
      var valdStr=d.validade||"2000-01-01";
      var validade;
      if(/^\d{4}-\d{2}-\d{2}$/.test(valdStr)){
        validade=new Date(valdStr+"T23:59:59");
      } else if(/^\d+$/.test(valdStr)){
        // Numero serial do Google Sheets (dias desde 30/12/1899)
        validade=new Date((parseInt(valdStr)-25569)*86400000);
      } else {
        validade=new Date(valdStr);
      }
      var statusOk=(d.status||"").toLowerCase().trim()==="ativo";
      if(statusOk&&validade>=hoje){
        localStorage.setItem("cl_ok","true");
        localStorage.setItem("cl_ts",Date.now().toString());
        overlay.style.display="none";
        app.style.display="flex";
      }else{
        showBlocked(statusOk?"vencida":"inativa");
      }
    })
    .catch(function(err){
      var ok=localStorage.getItem("cl_ok");
      var ts=parseInt(localStorage.getItem("cl_ts")||"0");
      if(ok==="true"&&(Date.now()-ts)<86400000){
        overlay.style.display="none";
        app.style.display="flex";
      }else{
        showBlocked("offline");
      }
    });
}

function showBlocked(reason){
  var msgs={
    "vencida":"Sua licença ComprovaLog venceu.<br>Entre em contato para renovar o acesso.",
    "inativa":"Sua licença ComprovaLog está inativa.<br>Entre em contato para reativar.",
    "offline":"Não foi possível verificar sua licença.<br>Conecte-se à internet e tente novamente."
  };
  document.querySelector(".lic-msg").innerHTML=msgs[reason]||msgs["inativa"];
  document.getElementById("license-overlay").style.display="flex";
  document.getElementById("app-content").style.display="none";
}

function isHeic(file){
  var name = (file.name||"").toLowerCase();
  var type = (file.type||"").toLowerCase();
  return name.endsWith(".heic")||name.endsWith(".heif")||type.includes("heic")||type.includes("heif");
}

function readExif(buffer){
  var result = {time:null, lat:null, lng:null};
  try{
    var view = new DataView(buffer);
    if(view.getUint16(0) !== 0xFFD8) return result;
    var offset = 2;
    while(offset < view.byteLength){
      var marker = view.getUint16(offset); offset += 2;
      if(marker === 0xFFE1){
        var exifOffset = offset+2;
        var exifStr = String.fromCharCode.apply(null, new Uint8Array(buffer,exifOffset,4));
        if(exifStr !== "Exif") break;
        var toff = exifOffset+6;
        var le = view.getUint16(toff) === 0x4949;
        var u16 = function(o){return view.getUint16(toff+o,le);};
        var u32 = function(o){return view.getUint32(toff+o,le);};
        var ifd = u32(4); var n = u16(ifd);
        var gpsOff = null;
        for(var i=0;i<n;i++){
          var eo=ifd+2+i*12; var tag=u16(eo);
          if(tag===0x8769){
            var eIFD=u32(eo+8); var ne=u16(eIFD);
            for(var j=0;j<ne;j++){
              var ee=eIFD+2+j*12;
              if(u16(ee)===0x9003){
                var so=u32(ee+8); var ds="";
                for(var k=0;k<19;k++) ds+=String.fromCharCode(view.getUint8(toff+so+k));
                var p=ds.split(" ");
                if(p.length===2){
                  var d=new Date(p[0].replace(/:/g,"/")+' '+p[1]);
                  if(!isNaN(d.getTime())) result.time=d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
                }
              }
            }
          }
          if(tag===0x8825) gpsOff=u32(eo+8);
        }
        if(gpsOff!==null){
          var gn=u16(gpsOff);
          var latD=null,latM=null,latS=null,latRef=null,lngD=null,lngM=null,lngS=null,lngRef=null;
          for(var i=0;i<gn;i++){
            var go=gpsOff+2+i*12; var gtag=u16(go); var gv=go+8;
            if(gtag===1) latRef=String.fromCharCode(view.getUint8(toff+gv));
            if(gtag===3) lngRef=String.fromCharCode(view.getUint8(toff+gv));
            if(gtag===2){var lo=u32(gv);latD=view.getUint32(toff+lo,le)/view.getUint32(toff+lo+4,le);latM=view.getUint32(toff+lo+8,le)/view.getUint32(toff+lo+12,le);latS=view.getUint32(toff+lo+16,le)/view.getUint32(toff+lo+20,le);}
            if(gtag===4){var lo=u32(gv);lngD=view.getUint32(toff+lo,le)/view.getUint32(toff+lo+4,le);lngM=view.getUint32(toff+lo+8,le)/view.getUint32(toff+lo+12,le);lngS=view.getUint32(toff+lo+16,le)/view.getUint32(toff+lo+20,le);}
          }
          if(latD!==null&&lngD!==null){
            var lat=latD+latM/60+latS/3600; var lng=lngD+lngM/60+lngS/3600;
            if(latRef==="S") lat=-lat; if(lngRef==="W") lng=-lng;
            result.lat=lat.toFixed(6); result.lng=lng.toFixed(6);
          }
        }
        break;
      } else { offset+=view.getUint16(offset); }
    }
  }catch(e){}
  return result;
}

function processImageBuffer(buffer, idx){
  var exif = readExif(buffer);
  var blob = new Blob([buffer]);
  var url = URL.createObjectURL(blob);
  var img = new Image();
  img.onload = function(){
    var cv = document.createElement("canvas");
    var w=img.width, h=img.height;
    if(w>1400){h=Math.round(h*1400/w);w=1400;}
    cv.width=w; cv.height=h;
    cv.getContext("2d").drawImage(img,0,0,w,h);
    state.photos[idx] = cv.toDataURL("image/jpeg",.82);
    state.times[idx]  = exif.time || nowStr();
    state.gps[idx]    = (exif.lat&&exif.lng)?{lat:exif.lat,lng:exif.lng}:null;
    URL.revokeObjectURL(url);
    render();
  };
  img.onerror = function(){
    URL.revokeObjectURL(url);
    render();
  };
  img.src = url;
}

function handlePhoto(event, idx){
  var file = event.target.files[0]; if(!file) return;

  // Read EXIF from original file first (works for both JPEG and HEIC)
  var br = new FileReader();
  br.onload = function(be){
    var origBuffer = be.target.result;
    var exif = readExif(origBuffer);

    if(isHeic(file)){
      // Show converting indicator
      var card = document.getElementById("steps-container").children[idx*2] || document.getElementById("steps-container").children[idx];
      render_converting(idx);
      // Convert HEIC to JPEG blob using heic2any
      heic2any({blob: file, toType:"image/jpeg", quality:0.82})
        .then(function(jpegBlob){
          var fr = new FileReader();
          fr.onload = function(e2){
            var img = new Image();
            img.onload = function(){
              var cv = document.createElement("canvas");
              var w=img.width,h=img.height;
              if(w>1400){h=Math.round(h*1400/w);w=1400;}
              cv.width=w;cv.height=h;
              cv.getContext("2d").drawImage(img,0,0,w,h);
              state.photos[idx] = cv.toDataURL("image/jpeg",.82);
              state.times[idx]  = exif.time || nowStr();
              state.gps[idx]    = (exif.lat&&exif.lng)?{lat:exif.lat,lng:exif.lng}:null;
              render();
            };
            img.src = e2.target.result;
          };
          fr.readAsDataURL(jpegBlob);
        })
        .catch(function(err){
          console.error("HEIC conversion failed:",err);
          render();
        });
    } else {
      // JPEG/PNG - process directly
      var ir = new FileReader();
      ir.onload = function(e){
        var img = new Image();
        img.onload = function(){
          var cv = document.createElement("canvas");
          var w=img.width,h=img.height;
          if(w>1400){h=Math.round(h*1400/w);w=1400;}
          cv.width=w;cv.height=h;
          cv.getContext("2d").drawImage(img,0,0,w,h);
          state.photos[idx] = cv.toDataURL("image/jpeg",.82);
          state.times[idx]  = exif.time || nowStr();
          state.gps[idx]    = (exif.lat&&exif.lng)?{lat:exif.lat,lng:exif.lng}:null;
          render();
        };
        img.src = e.target.result;
      };
      ir.readAsDataURL(file);
    }
  };
  br.readAsArrayBuffer(file);
}

function render_converting(idx){
  // Show spinner on that card only
  var c = document.getElementById("steps-container");
  var cards = c.querySelectorAll(".step-card");
  if(cards[idx]){
    var ul = cards[idx].querySelector(".upload-label");
    if(ul) ul.innerHTML='<div class="spinner"></div><span class="utxt">Convertendo HEIC...</span>';
  }
}

function render(){
  var c = document.getElementById("steps-container");
  var done = doneCount();
  c.innerHTML = "";
  for(var i=0;i<stepDefs.length;i++){
    var s = stepDefs[i];
    var isDone = !!state.photos[i];
    var isActive = (i===done);
    var card = document.createElement("div");
    card.className = "step-card"+(isDone?" done":(isActive?" active":""));
    var snumClass = "snum"+(isDone?" done":(isActive?" active":""));
    var body = "";
    if(isDone){
      var hasGPS = state.gps[i]&&state.gps[i].lat;
      var gpsHtml = hasGPS
        ? '<div class="gps-box"><span class="gps-lbl">&#128205; GPS</span><a class="gps-link" href="'+mapsUrl(state.gps[i].lat,state.gps[i].lng)+'" target="_blank">Ver no mapa</a></div>'
        : '<div class="gps-box nogps"><span class="gps-lbl nogps">&#128205; Sem GPS</span></div>';
      body = '<img class="photo-preview" src="'+state.photos[i]+'" alt="">'
           + '<div class="meta-row">'
           + '<div class="time-box"><span class="time-label">&#128336;</span><span class="time-input" id="ti-'+i+'">'+(state.times[i]||"-")+'</span></div>'
           + gpsHtml
           + '<textarea class="obs-input" id="obs-'+i+'" rows="1" placeholder="Observa&ccedil;&atilde;o">'+(state.obs[i]||"")+'</textarea>'
           + '</div>'
           + '<button class="swap-btn" onclick="triggerUpload('+i+')">&#8635; Trocar foto</button>';
    } else if(isActive){
      body = '<label class="upload-label" onclick="triggerUpload('+i+')">'
           + '<span class="photo-icon">&#128247;</span>'
           + '<span class="utxt">Clique para fazer upload da foto</span>'
           + '<span class="hint">JPG, PNG ou HEIC</span>'
           + '</label>';
    } else {
      body = '<div class="locked-area">&#128274;<span>Aguardando etapas anteriores</span></div>';
    }
    card.innerHTML = '<div class="step-hd">'
      + '<div class="'+snumClass+'">'+(isDone?"&#10003;":(i+1))+'</div>'
      + '<div class="sinfo"><div class="stitle">'+s.title+'</div><div class="ssub">'+s.sub+'</div></div>'
      + '<span class="step-icon">'+s.icon+'</span>'
      + '</div>'+body;
    c.appendChild(card);
  }
  var pct=done/stepDefs.length*100;
  document.getElementById("progress").style.width=pct+"%";
  document.getElementById("prog-lbl").textContent=done+" / "+stepDefs.length;
  document.getElementById("finish-btn").disabled=(done<stepDefs.length);
}

function finish(){
  for(var i=0;i<stepDefs.length;i++){var t=getTimeVal(i);if(t)state.times[i]=t;state.obs[i]=getObsVal(i);}
  var v=getViagem(),plate=document.getElementById("plate").value||"Nao informada",obra=document.getElementById("obra").value||"Nao informada";
  state.startTime=state.times[0]||nowStr();
  state.endTime=state.times[stepDefs.length-1]||nowStr();
  var gc=gpsCount();
  document.getElementById("rep-viagem").textContent=v;
  document.getElementById("rep-plate").textContent=plate;
  document.getElementById("rep-obra").textContent=obra;
  document.getElementById("rep-date-val").textContent=dateShort();
  document.getElementById("rep-start").textContent=state.startTime;
  document.getElementById("rep-end").textContent=state.endTime;
  document.getElementById("rep-photos").textContent=doneCount()+" / 4";
  document.getElementById("rep-gps").textContent=gc+" / 4 fotos";
  document.getElementById("report-date").textContent=dateStr();
  document.getElementById("report-badge").textContent="Viagem "+v;
  var html="";
  for(var i=0;i<stepDefs.length;i++){
    var hasGPS=state.gps[i]&&state.gps[i].lat;
    var gpsLine=hasGPS
      ? '<div class="rstep-gps">&#128205; <a href="'+mapsUrl(state.gps[i].lat,state.gps[i].lng)+'" target="_blank" style="color:#2d7a2d">'+state.gps[i].lat+', '+state.gps[i].lng+'</a></div>'
      : '<div class="rstep-gps nogps">&#128205; GPS nao disponivel</div>';
    var obsLine=state.obs[i]?'<div class="rstep-obs">'+state.obs[i]+'</div>':"";
    html+='<div class="rstep"><span class="rstep-dot"></span><div>'
        +'<div><span class="rstep-time">'+(state.times[i]||"-")+"</span>"+stepDefs[i].title+"</div>"
        +gpsLine+obsLine+"</div></div>";
  }
  document.getElementById("rep-steps").innerHTML=html;
  document.getElementById("report").classList.add("visible");
  document.getElementById("report").scrollIntoView({behavior:"smooth"});
}

function novaViagem(){
  for(var i=0;i<stepDefs.length;i++){var t=getTimeVal(i);if(t)state.times[i]=t;state.obs[i]=getObsVal(i);}
  var next=parseInt(getViagem()||1)+1;
  state={photos:{},times:{},gps:{},obs:{},startTime:nowStr(),endTime:null};
  document.getElementById("viagem").value=next;
  document.getElementById("plate").value="";
  document.getElementById("obra").value="";
  document.getElementById("report").classList.remove("visible");
  window.scrollTo({top:0,behavior:"smooth"});
  render();
}

function gerarPDF(){
  for(var i=0;i<stepDefs.length;i++){var t=getTimeVal(i);if(t)state.times[i]=t;state.obs[i]=getObsVal(i);}
  state.startTime=state.times[0]||state.startTime;
  state.endTime=state.times[stepDefs.length-1]||state.endTime;
  var btn=document.getElementById("pdf-btn");
  btn.disabled=true;btn.textContent="Gerando PDF...";
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  var W=210,M=16,v=getViagem();
  var plate=document.getElementById("plate").value||"Nao informada";
  var obra=document.getElementById("obra").value||"Nao informada";
  var dateVal=dateShort();
  // Cabecalho
  doc.setFillColor(255,255,255);doc.rect(0,0,W,30,"F");
  doc.setFillColor(22,44,66);doc.rect(0,0,W,2,"F");
  try{doc.addImage("data:image/png;base64,"+LOGO_B64,"PNG",M,6,65,18);}catch(e){}
  doc.setFillColor(22,44,66);doc.roundedRect(W-M-34,7,34,13,2,2,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(8);doc.setFont("helvetica","bold");
  doc.text("VIAGEM N "+v,W-M-17,15,{align:"center"});
  doc.setFillColor(22,44,66);doc.rect(0,30,W,1,"F");
  var y=38,col2x=W/2+4;
  var lF=[["Obra / Cliente",obra],["Placa",plate],["Data",dateVal]];
  var rF=[["Horario de inicio",state.startTime],["Horario de conclusao",state.endTime||"-"],["GPS registrado",gpsCount()+" / 4 fotos"]];
  doc.setFontSize(7);doc.setFont("helvetica","bold");doc.setTextColor(120,130,140);
  doc.text("DADOS DA VIAGEM",M,y);y+=4;
  doc.setDrawColor(220,225,230);doc.setLineWidth(0.3);doc.line(M,y,W-M,y);y+=5;
  var rH=9;
  for(var i=0;i<lF.length;i++){var ry=y+i*rH;doc.setFont("helvetica","normal");doc.setFontSize(7.5);doc.setTextColor(150,160,170);doc.text(lF[i][0],M,ry);doc.setFont("helvetica","bold");doc.setFontSize(9);doc.setTextColor(22,44,66);doc.text(String(lF[i][1]),M,ry+4.5);}
  for(var i=0;i<rF.length;i++){var ry=y+i*rH;doc.setFont("helvetica","normal");doc.setFontSize(7.5);doc.setTextColor(150,160,170);doc.text(rF[i][0],col2x,ry);doc.setFont("helvetica","bold");doc.setFontSize(9);doc.setTextColor(22,44,66);doc.text(String(rF[i][1]),col2x,ry+4.5);}
  y+=lF.length*rH+6;doc.setDrawColor(220,225,230);doc.line(M,y,W-M,y);y+=6;
  doc.setFontSize(7);doc.setFont("helvetica","bold");doc.setTextColor(120,130,140);
  doc.text("REGISTRO FOTOGRAFICO",M,y);y+=4;doc.setDrawColor(220,225,230);doc.line(M,y,W-M,y);y+=5;
  var imgW=W-M*2,imgH=imgW*0.45,PH=297,MB=18;
  var tits=["Saida da obra","Trajeto - ponto 1","Trajeto - ponto 2","Entrada no bota fora"];
  for(var i=0;i<stepDefs.length;i++){
    var eH=7+(state.obs[i]?7:0);
    if(y+6+imgH+eH+5>PH-MB){doc.addPage();y=16;}
    doc.setFillColor(22,44,66);doc.rect(M,y,imgW,6,"F");
    doc.setFont("helvetica","bold");doc.setFontSize(7.5);doc.setTextColor(255,255,255);
    doc.text(tits[i].toUpperCase(),M+3,y+4.2);
    doc.setFont("helvetica","normal");doc.setFontSize(7.5);doc.setTextColor(74,140,192);
    doc.text(state.times[i]||"-",M+imgW-3,y+4.2,{align:"right"});
    y+=6;
    if(state.photos[i]){try{doc.addImage(state.photos[i],"JPEG",M,y,imgW,imgH);}catch(e){doc.setFillColor(240,244,248);doc.rect(M,y,imgW,imgH,"F");}}
    else{doc.setFillColor(240,244,248);doc.rect(M,y,imgW,imgH,"F");}
    y+=imgH+3;
    var hasGPS=state.gps[i]&&state.gps[i].lat;
    if(hasGPS){doc.setFont("helvetica","bold");doc.setFontSize(7);doc.setTextColor(45,122,45);doc.text("GPS: "+state.gps[i].lat+", "+state.gps[i].lng+"  |  maps.google.com/?q="+state.gps[i].lat+","+state.gps[i].lng,M,y+4);y+=7;}
    else{doc.setFont("helvetica","italic");doc.setFontSize(7);doc.setTextColor(176,120,0);doc.text("GPS nao disponivel nesta foto",M,y+4);y+=7;}
    if(state.obs[i]){doc.setFont("helvetica","italic");doc.setFontSize(7.5);doc.setTextColor(100,120,140);doc.text("Obs: "+state.obs[i],M,y+4);y+=7;}
    y+=3;
  }
  if(y+10>PH-MB){doc.addPage();y=16;}
  doc.setDrawColor(210,218,225);doc.setLineWidth(0.3);doc.line(M,y,W-M,y);y+=4;
  doc.setFont("helvetica","normal");doc.setFontSize(6.5);doc.setTextColor(160,170,180);
  doc.text("Gerado em "+dateVal+" as "+nowStr(),M,y);
  doc.text("Documento de acompanhamento operacional",W-M,y,{align:"right"});
  var pf=plate.replace(/[^A-Z0-9]/g,""),df=dateVal.replace(/\//g,"");
  doc.save("relatorio-"+pf+"-"+df+"-viagem"+v+".pdf");
  btn.disabled=false;btn.innerHTML="&#8681;&nbsp;Baixar PDF";
}

function gerarZIP(){
  var btn=document.getElementById("zip-btn");
  btn.disabled=true;btn.textContent="Gerando ZIP...";

  var v=getViagem();
  var plate=(document.getElementById("plate").value||"SEM-PLACA").replace(/[^A-Z0-9]/g,"");
  var obra=(document.getElementById("obra").value||"SEM-OBRA").replace(/[^a-zA-Z0-9]/g,"-").substring(0,20);
  var dateVal=dateShort().replace(/\//g,"");
  var stepNames=["01-saida-da-obra","02-trajeto-ponto1","03-trajeto-ponto2","04-entrada-botafora"];

  var zip=new JSZip();
  var folder=zip.folder("viagem"+v+"_"+plate+"_"+dateVal);

  var hasPhotos=false;
  for(var i=0;i<stepDefs.length;i++){
    if(state.photos[i]){
      hasPhotos=true;
      // Convert base64 data URL to base64 string only
      var b64=state.photos[i].replace(/^data:image\/jpeg;base64,/,"");
      var time=(state.times[i]||"").replace(/:/g,"h").substring(0,5);
      var fname=stepNames[i]+"_"+time+".jpg";
      folder.file(fname, b64, {base64:true});
    }
  }

  // Add a text summary file
  var summary="SOLUMAX - Registro de Viagem\n";
  summary+="========================\n\n";
  summary+="Viagem n: "+v+"\n";
  summary+="Placa: "+(document.getElementById("plate").value||"-")+"\n";
  summary+="Obra/Cliente: "+(document.getElementById("obra").value||"-")+"\n";
  summary+="Data: "+dateShort()+"\n";
  summary+="Inicio: "+(state.startTime||"-")+"\n";
  summary+="Conclusao: "+(state.endTime||"-")+"\n\n";
  summary+="Etapas:\n";
  var names=["Saida da obra","Trajeto - ponto 1","Trajeto - ponto 2","Entrada no bota fora"];
  for(var i=0;i<stepDefs.length;i++){
    summary+="  "+names[i]+": "+(state.times[i]||"-");
    if(state.gps[i]&&state.gps[i].lat) summary+=" | GPS: "+state.gps[i].lat+", "+state.gps[i].lng;
    if(state.obs[i]) summary+=" | Obs: "+state.obs[i];
    summary+="\n";
  }
  folder.file("resumo.txt", summary);

  zip.generateAsync({type:"blob"}).then(function(content){
    var url=URL.createObjectURL(content);
    var a=document.createElement("a");
    a.href=url;
    a.download="viagem"+v+"_"+plate+"_"+dateVal+".zip";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    btn.disabled=false;btn.innerHTML="&#128193;&nbsp;Baixar Fotos (ZIP)";
  });
}

checkLicense();
render();
